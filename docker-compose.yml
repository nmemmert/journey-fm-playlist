services:
  journey-fm-playlist:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: journey-fm-playlist
    restart: unless-stopped
    environment:
      PLEX_TOKEN: ${PLEX_TOKEN}
      SERVER_IP: ${SERVER_IP}
      PLAYLIST_NAME: ${PLAYLIST_NAME:-Journey FM Recently Played}
      SELECTED_STATIONS: ${SELECTED_STATIONS:-journey_fm,spirit_fm}
      AUTO_UPDATE: ${AUTO_UPDATE:-true}
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-15}
      UPDATE_UNIT: ${UPDATE_UNIT:-Minutes}
      CONTAINER_RUN_MODE: ${CONTAINER_RUN_MODE:-loop}
      CHROME_BINARY: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      JOURNEYFM_DATA_DIR: /data
    volumes:
      - journey-fm-data:/data

volumes:
  journey-fm-data:
